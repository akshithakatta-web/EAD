<!DOCTYPE html>
<html>
<head>
<title>Exp 04</title>
<style>
.container{
background-color: bisque;
border-radius: 20px;
 width:600px;
display:flex;
justify-content: center;
gap:25px 
}
.item{
border: solid 2px;
height: 25px;
width: 50px;
display: flex;
justify-content: center;
align-items: center;
background-color: aqua;
border-radius: 20px;
}
.item:hover{
background-color: rgba(143, 143, 232, 0.951);
}
</style>
</head>
<body>
<div class="container">
<div class="item">item1</div>
<div class="item">item2</div>
<div class="item">item3</div>
<div class="item">item4</div>
</div>
</body>
</html>
