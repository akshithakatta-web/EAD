<!DOCTYPE html>
<html >
<head>
<title>Exp 08</title>
<style>
.container{
border:solid 2px;
width:300px;
height:200px;
margin:auto;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
background-color: bisque;
}
.name,.pass{
color:blue;
font-size: 20px;
}
button:hover{
background-color: rgba(12, 202, 202, 0.821);
}
</style>
</head>
<body>
<div class="container">
<div class="name">
<label >Name:</label>
<input type="text" required>
</div>
<div class="pass">
<label class="password" >Password:</label>
<input type="text" class="password" required>
</div>
<button>Submit</button>
</div>
</body>
</html>
