<!DOCTYPE html>
<html>
<head>
    <title>CSS Card Layout</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            width: 300px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
        }

        .card h2{
            color: #2c3e50;
        }

        .card p{
            color: #555;
            font-size: 16px;
        }

        .btn{
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover{
            background-color: #2c3e50;
        }
    </style>

</head>
<body>

    <div class="card">
        <h2>Student Details</h2>

        <p><strong>Name:</strong> AKSHITHA</p>
        <p><strong>Branch:</strong> IT-2</p>
        <p><strong>Roll No:</strong> 160124737081</p>

        <a href="#" class="btn">View Profile</a>
    </div>

</body>
</html>
