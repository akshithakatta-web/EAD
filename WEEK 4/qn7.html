<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar with Dropdown</title>

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar{
            list-style-type: none;
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            overflow: hidden;
        }

        .navbar li{
            float: left;
            position: relative;
        }

        .navbar li a{
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px 20px;
        }

        .navbar li a:hover{
            background-color: #34495e;
        }

        .dropdown-content{
            display: none;
            position: absolute;
            background-color: #34495e;
            min-width: 150px;
        }

        .dropdown-content li{
            float: none;
        }

        .dropdown-content li a{
            padding: 10px;
            display: block;
        }

        .dropdown:hover .dropdown-content{
            display: block;
        }
    </style>

</head>
<body>

    <ul class="navbar">
        <li><a href="#">Home</a></li>

        <li class="dropdown">
            <a href="#">Courses</a>
            <ul class="dropdown-content">
                <li><a href="#">CSE</a></li>
                <li><a href="#">IT</a></li>
                <li><a href="#">ECE</a></li>
            </ul>
        </li>

        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

</body>
</html>
