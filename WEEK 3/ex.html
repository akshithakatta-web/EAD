<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial￾scale=1.0">
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/b
ootstrap.min.css" rel="stylesheet">
<title>Student Registration Form</title>
<style>
body{
background: linear-gradient(to right,#74ebd5,#ACB6E5);
margin:30px;
font-family: Arial, sans-serif;
}
h1{
text-align:center;
margin-bottom:30px;
color:#1b3c59;
}
.form-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0px 10px 20px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<h1>Student Registration Form</h1>
<div class="container form-box">
<form class="row g-3">
<div class="col-md-6">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" value="AKSHITHA">
</div>
<div class="col-md-6">
<label class="form-label">Student Roll Number</label>
<input type="number" class="form-control" 
value="160124737081">
</div>
<div class="col-md-6">
<label class="form-label">Student Email</label>
<input type="email" class="form-control" 
value="akshi020605@gmail.com">
</div>
<div class="col-md-6">
<label class="form-label">Password</label>
<input type="password" class="form-control" placeholder="Enter 
Password">
</div>
<div class="col-12">
<label class="form-label">Address</label>
<input type="text" class="form-control" placeholder="Apartment, 
street, area">
</div>
<div class="col-md-6">
<label class="form-label">City</label>
<input type="text" class="form-control" placeholder="Enter City">
</div>
<div class="col-md-4">
<label class="form-label">State</label>
<select class="form-select">
<option selected>Select State</option>
<option>Telangana</option>
<option>Andhra Pradesh</option>
<option>Karnataka</option>
<option>Tamil Nadu</option>
</select>
</div>
<div class="col-md-2">
<label class="form-label">Zip</label>
<input type="text" class="form-control" placeholder="Zip Code">
</div>
<div class="col-12">
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Agree to Terms and Conditions
</label>
</div>
</div>
<div class="col-12">
<button type="submit" class="btn btn￾success">Register</button>
</div>
</form>
</div>
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/boot
strap.bundle.min.js"></script>
</body>
</html>
