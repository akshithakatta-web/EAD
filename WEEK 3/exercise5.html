<!DOCTYPE html>
<html>
<head>
<title>Exp 05</title>

<style>
.box1,.box2,.box3{
  border: solid 2px;
  height:100px;
  width:100px;
  text-align: center;
}

.box1{
  position: sticky;
  top: 0;
  left:210px;
  background-color: rgba(58, 58, 200, 0.645);
}

.box2{
  position: relative;
  background-color: aqua;
  left:100px;
}

.box3{
  position: static;
  background-color: rgb(215, 215, 48);
}
</style>

</head>
<body>

<div class="box1">BOX-1</div>
<div class="box2">BOX-2</div>
<div class="box3">BOX-3</div>

<div style="height:1000px;"></div>

</body>
</html>
